<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UI System</title>

<style>

body{
    margin:0;
    background:black;
    font-family:Arial;
}


/* display */

#display{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:160px; /* panel height */
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
}

#display iframe{
    width:100%;
    height:100%;
    border:none;
}


/* panel */

#panel{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:160px;
    background:black;
    border-top:2px solid gold;
    display:flex;
    justify-content:center;
    align-items:center;
}


/* grid */

.grid{
    display:grid;
    grid-template-columns:repeat(5,70px);
    gap:10px;
    border:3px solid gold;
    padding:10px;
    border-radius:20px;
}

button{
    height:50px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
}


/* hide button */

#toggleBtn{
    position:fixed;
    right:10px;
    bottom:170px;
    background:gold;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    font-weight:bold;
}

</style>
</head>



<body>


<div id="display">
Camera / AR Screen
</div>



<button id="toggleBtn" onclick="togglePanel()">
Hide
</button>



<div id="panel">

<div class="grid">

<button onclick="openUI('ui1.html')">1</button>
<button onclick="openUI('ui2.html')">2</button>
<button onclick="openUI('ui3.html')">3</button>
</div>
</div>



<script>


function openUI(page){

document.getElementById("display").innerHTML =
'<iframe src="'+page+'"></iframe>';

}


function togglePanel(){

let panel = document.getElementById("panel");
let display = document.getElementById("display");
let btn = document.getElementById("toggleBtn");

if(panel.style.display=="none"){

panel.style.display="flex";
display.style.bottom="160px";
btn.innerHTML="Hide";
btn.style.bottom="170px";

}else{

panel.style.display="none";
display.style.bottom="0px";
btn.innerHTML="Show";
btn.style.bottom="10px";

}

}


</script>


</body>
</html>
